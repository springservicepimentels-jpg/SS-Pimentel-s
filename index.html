<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Service Pimentels | Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
        .cart-badge { position: absolute; top: -5px; right: -10px; background: #0070ba; color: white; border-radius: 50%; padding: 2px 6px; font-size: 12px; }
    </style>
</head>
<body>

    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-20 flex justify-between items-center">
            <div class="hidden md:flex space-x-8 text-sm font-medium uppercase tracking-widest text-gray-600">
                <a href="#" class="hover:text-black">Inicio</a>
                <a href="#productos" class="hover:text-black">Catálogo</a>
            </div>

            <div class="text-center">
                <img src="logo Final SSP (1).png" alt="logo Final SSP (1).png" class="h-12 mx-auto">
            </div>

            <div class="relative cursor-pointer" onclick="toggleCart()">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-7 h-7 text-gray-700">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                </svg>
                <span id="cart-count" class="cart-badge">0</span>
            </div>
        </div>
    </nav>

    <header class="bg-gray-100 py-16 text-center">
        <h2 class="text-4xl font-light tracking-tight text-gray-900">NUEVA COLECCIÓN DE SERVICIOS</h2>
        <p class="mt-4 text-gray-500 max-w-xl mx-auto">Calidad profesional de Spring Service Pimentels ahora disponible online.</p>
    </header>

    <main id="productos" class="max-w-7xl mx-auto px-4 py-12 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-10">
        
        <div class="group relative">
            <div class="aspect-h-1 aspect-w-1 w-full overflow-hidden rounded-lg bg-gray-200">
                <img src="https://via.placeholder.com/500x600" class="h-full w-full object-cover object-center group-hover:opacity-75 transition">
            </div>
            <div class="mt-4 flex justify-between">
                <div>
                    <h3 class="text-sm text-gray-700 font-bold uppercase">Mantenimiento Residencial</h3>
                    <p class="mt-1 text-sm text-gray-500">Servicio Completo</p>
                </div>
                <p class="text-sm font-medium text-gray-900">$120.00</p>
            </div>
            <button onclick="addToCart('Mantenimiento Residencial', 120)" class="mt-4 w-full bg-black text-white py-2 text-sm uppercase font-bold hover:bg-gray-800 transition">
                Añadir al carrito
            </button>
        </div>

        <div class="group relative">
            <div class="aspect-h-1 aspect-w-1 w-full overflow-hidden rounded-lg bg-gray-200">
                <img src="https://via.placeholder.com/500x600" class="h-full w-full object-cover object-center group-hover:opacity-75 transition">
            </div>
            <div class="mt-4 flex justify-between">
                <div>
                    <h3 class="text-sm text-gray-700 font-bold uppercase">Reparación Especializada</h3>
                    <p class="mt-1 text-sm text-gray-500">Diagnóstico incluido</p>
                </div>
                <p class="text-sm font-medium text-gray-900">$85.00</p>
            </div>
            <button onclick="addToCart('Reparación Especializada', 85)" class="mt-4 w-full bg-black text-white py-2 text-sm uppercase font-bold hover:bg-gray-800 transition">
                Añadir al carrito
            </button>
        </div>

    </main>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push({name, price});
            total += price;
            document.getElementById('cart-count').innerText = cart.length;
            
            Swal.fire({
                title: '¡Añadido!',
                text: `${name} se agregó al carrito`,
                icon: 'success',
                timer: 1500,
                showConfirmButton: false,
                position: 'top-end',
                toast: true
            });
        }

        function toggleCart() {
            if(cart.length === 0) {
                Swal.fire('Tu carrito está vacío', '', 'info');
                return;
            }
            
            let itemsList = cart.map(item => `${item.name} - $${item.price}`).join('<br>');
            
            Swal.fire({
                title: 'Tu Carrito Shopify',
                html: `${itemsList}<br><br><strong>Total: $${total}</strong>`,
                showCancelButton: true,
                confirmButtonText: 'Pagar con PayPal/Chase',
                confirmButtonColor: '#0070ba',
                cancelButtonText: 'Seguir comprando'
            }).then((result) => {
                if (result.isConfirmed) {
                    // Aquí pones tu link de PayPal.me o botón de pago
                    window.location.href = `https://www.paypal.me/TUUSUARIO/${total}`;
                }
            });
        }
    </script>
</body>
</html>
