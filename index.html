<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring Service Pimentels</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Assistant', sans-serif; }
        .cart-count { background: #000; color: #fff; border-radius: 50%; padding: 2px 6px; font-size: 11px; position: absolute; top: -5px; right: -10px; }
    </style>
</head>
<body class="bg-white">

    <div class="bg-black text-white text-center py-2 text-[10px] tracking-[0.3em] uppercase">
        Servicios Profesionales de Alta Calidad
    </div>

    <nav class="border-b border-gray-100 py-8 px-10 flex justify-between items-center bg-white sticky top-0 z-50">
        
        <div class="flex-1 flex justify-start">
            <a href="/">
                <img src="SPRING%20LOGO.png" alt="Spring Service Pimentels" class="h-24 md:h-32 w-auto object-contain" onerror="this.src='https://via.placeholder.com/300x100?text=LOGO+PIMENTELS'">
            </a>
        </div>

        <div class="hidden md:flex flex-1 justify-center space-x-12 text-[12px] tracking-[0.3em] uppercase font-light">
            <a href="#" class="hover:text-gray-400 transition">Inicio</a>
            <a href="#servicios" class="hover:text-gray-400 transition">Servicios</a>
            <a href="#" class="hover:text-gray-400 transition">Contacto</a>
        </div>

        <div class="flex-1 flex justify-end">
            <button onclick="verCarrito()" class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="0.8" stroke="currentColor" class="w-10 h-10">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 10.5V6a3.75 3.75 0 10-7.5 0v4.5m11.356-1.993l1.263 12c.07.665-.45 1.243-1.119 1.243H4.25a1.125 1.125 0 01-1.12-1.243l1.264-12A1.125 1.125 0 015.513 7.5h12.974c.576 0 1.059.435 1.119 1.007zM8.625 10.5a.375.375 0 11-.75 0 .375.375 0 01.75 0zm7.5 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z" />
                </svg>
                <span id="cart-number" class="cart-count">0</span>
            </button>
        </div>
    </nav>

    <header class="relative h-[85vh] flex items-center justify-center text-center">
        <img src="https://images.unsplash.com/photo-1621905235294-7500bed49da3?auto=format&fit=crop&w=1920&q=80" class="absolute inset-0 w-full h-full object-cover brightness-75">
        <div class="relative z-10 text-white px-4">
            <h1 class="text-6xl md:text-8xl font-extralight tracking-tighter mb-4">Pimentels</h1>
            <p class="text-xs md:text-sm uppercase tracking-[0.6em] mb-12">Expertos en Mantenimiento</p>
            <a href="#servicios" class="bg-white text-black px-12 py-4 text-[10px] tracking-[0.3em] uppercase hover:bg-gray-100 transition">Explorar Servicios</a>
        </div>
    </header>

    <section id="servicios" class="max-w-7xl mx-auto px-6 py-24">
        <h2 class="text-center text-3xl font-light tracking-[0.3em] uppercase mb-20">Nuestros Servicios</h2>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-16">
            <div class="group text-center">
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden mb-6">
                    <img src="https://images.unsplash.com/photo-1584622650111-993a426fbf0a?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000">
                </div>
                <h3 class="text-xs tracking-[0.2em] uppercase">Limpieza Profunda</h3>
                <p class="mt-2 text-gray-500 font-light">$150.00 USD</p>
                <button onclick="agregarAlCarrito('Limpieza Profunda', 150)" class="mt-4 border-b border-black text-[9px] uppercase tracking-widest pb-1 hover:text-gray-400">Agregar al carrito</button>
            </div>
            <div class="group text-center">
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden mb-6">
                    <img src="https://images.unsplash.com/photo-1595844730298-b960ff98fee0?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000">
                </div>
                <h3 class="text-xs tracking-[0.2em] uppercase">Mantenimiento Correctivo</h3>
                <p class="mt-2 text-gray-500 font-light">$200.00 USD</p>
                <button onclick="agregarAlCarrito('Mantenimiento Correctivo', 200)" class="mt-4 border-b border-black text-[9px] uppercase tracking-widest pb-1 hover:text-gray-400">Agregar al carrito</button>
            </div>
            <div class="group text-center">
                <div class="aspect-[3/4] bg-gray-50 overflow-hidden mb-6">
                    <img src="https://images.unsplash.com/photo-1505798577917-a65157d3320a?auto=format&fit=crop&w=600&q=80" class="w-full h-full object-cover group-hover:scale-105 transition duration-1000">
                </div>
                <h3 class="text-xs tracking-[0.2em] uppercase">Reparación General</h3>
                <p class="mt-2 text-gray-500 font-light">$95.00 USD</p>
                <button onclick="agregarAlCarrito('Reparación General', 95)" class="mt-4 border-b border-black text-[9px] uppercase tracking-widest pb-1 hover:text-gray-400">Agregar al carrito</button>
            </div>
        </div>
    </section>

    <script>
        let carrito = [];
        let total = 0;
        function agregarAlCarrito(nombre, precio) {
            carrito.push({nombre, precio});
            total += precio;
            document.getElementById('cart-number').innerText = carrito.length;
            Swal.fire({ text: 'Producto añadido', icon: 'success', toast: true, position: 'bottom-end', showConfirmButton: false, timer: 1500 });
        }
        function verCarrito() {
            if (carrito.length === 0) {
                Swal.fire({ title: 'Carrito Vacío', icon: 'info', confirmButtonColor: '#000' });
                return;
            }
            let lista = carrito.map(i => `<div class="flex justify-between text-xs uppercase mb-2"><span>${i.nombre}</span> <span>$${i.precio}</span></div>`).join('');
            Swal.fire({
                title: 'TU COMPRA',
                html: `<div class="mt-6">${lista}<hr class="my-4"><div class="flex justify-between font-bold uppercase text-sm"><span>Total</span> <span>$${total} USD</span></div></div>`,
                showCancelButton: true,
                confirmButtonText: 'Finalizar Pedido',
                cancelButtonText: 'Cerrar',
                confirmButtonColor: '#000',
                reverseButtons: true
            });
        }
    </script>
</body>
</html>
